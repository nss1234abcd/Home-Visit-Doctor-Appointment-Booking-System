<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="217" height="46" viewBox="0 0 217 46" role="img" aria-label="BookMyDoctor logo">
  <title>BookMyDoctor</title>
  <!-- Left icon: stylized stethoscope inside rounded square -->
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-opacity="1" stop-color="#2D9CDB"/>
      <stop offset="100%" stop-opacity="1" stop-color="#2F80ED"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="38" height="38" rx="6" fill="url(#g1)"/>
  <!-- stethoscope shape -->
  <g transform="translate(8,8) scale(0.75)" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 6 C6 1, 18 1, 18 6 L18 14" />
    <path d="M18 14 C22 18, 22 26, 18 30 C14 34, 6 34, 2 30 C-2 26 -2 18 2 14" />
    <circle cx="26" cy="34" r="5" fill="#fff"/>
    <circle cx="26" cy="34" r="3" fill="url(#g1)"/>
  </g>

  <!-- Bold Text: BookMyDoctor -->
  <g transform="translate(46, 13.0)">
    <text x="0" y="16" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="20" fill="#333">BookMyDoctor</text>
  </g>
</svg>
